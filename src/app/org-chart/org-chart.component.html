<div class="org-chart-shell">
  <div class="org-chart-toolbar">
    <input
      type="text"
      class="org-chart-search"
      placeholder="Tìm theo tên hoặc chức danh..."
      (input)="onSearchInput($event)"
    />
    <button type="button" (click)="expandAll()">Mở rộng tất cả</button>
    <button type="button" (click)="collapseAll()">Thu gọn tất cả</button>
    <button type="button" (click)="fit()">Fit màn hình</button>
  </div>

  <div class="org-chart-legend">
    <span class="legend-item"><i class="legend-dot legend-dot--regular"></i>HĐQT / Phòng ban</span>
    <span class="legend-item"><i class="legend-dot legend-dot--independent"></i>Thành viên độc lập</span>
    <span class="legend-item"><i class="legend-dot legend-dot--executive"></i>Ban điều hành</span>
  </div>

  @if (initError()) {
    <div class="org-chart-error" role="alert">
      Không thể hiển thị sơ đồ tổ chức. Vui lòng tải lại trang.
    </div>
  } @else {
    <div #chartContainer class="org-chart-container"></div>
  }
</div>
